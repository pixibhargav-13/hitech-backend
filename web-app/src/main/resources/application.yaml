server:
  port: 8080

spring:
  application:
    name: hitech-erp
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:hitech_erp}
    username: ${DB_USER:hitech}
    password: ${DB_PASSWORD:hitech}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

# Self-issued JWT config - see JwtTokenProvider. Override JWT_SECRET in every real environment.
app:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-me-dev-only-change-me-32b}
    access-token-ttl-minutes: ${ACCESS_TOKEN_TTL_MINUTES:30}
    refresh-token-ttl-days: ${REFRESH_TOKEN_TTL_DAYS:7}
  bootstrap-admin:
    email: ${BOOTSTRAP_ADMIN_EMAIL:admin@hitech.local}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:Admin@123}
    full-name: ${BOOTSTRAP_ADMIN_NAME:Super Admin}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: [ health, info ]
