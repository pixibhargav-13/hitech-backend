openapi: 3.0.1
info:
  title: Hitech ERP - User Management API
  description: Authentication, dynamic role/permission management and user administration.
  version: '1.0'
servers:
  - url: http://localhost:8080
    description: Local Server

tags:
  - name: authentication
    description: Login, token refresh/logout, current-user profile
  - name: role
    description: Dynamic role CRUD - a role is a name plus a chosen set of module permissions
  - name: module
    description: Available modules and the actions that can be granted per module
  - name: permission
    description: Flat permission list (module + action pairs)
  - name: user
    description: User administration (create/update/deactivate, role assignment)

paths:
  /api/v1/auth/login:
    post:
      tags: [ authentication ]
      summary: Authenticate with email + password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid email or password

  /api/v1/auth/refresh:
    post:
      tags: [ authentication ]
      summary: Exchange a valid refresh token for a new access token
      operationId: refresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Refresh token invalid, expired or revoked

  /api/v1/auth/logout:
    post:
      tags: [ authentication ]
      summary: Revoke a refresh token
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '204':
          description: Logged out

  /api/v1/auth/me:
    get:
      tags: [ authentication ]
      summary: Current authenticated user, their role and effective permission codes
      operationId: getCurrentUser
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'

  /api/v1/roles:
    get:
      tags: [ role ]
      summary: List all roles
      operationId: getRoles
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoleResponse'
    post:
      tags: [ role ]
      summary: Create a new dynamic role
      operationId: createRole
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleRequest'
      responses:
        '200':
          description: Role created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'

  /api/v1/roles/{id}:
    get:
      tags: [ role ]
      summary: Get a role by id
      operationId: getRoleById
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/RoleId'
      responses:
        '200':
          description: Role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
    put:
      tags: [ role ]
      summary: Update a role's name, description and/or permissions
      operationId: updateRole
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/RoleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleRequest'
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
    delete:
      tags: [ role ]
      summary: Delete a role (blocked if it is a system role or still assigned to users)
      operationId: deleteRole
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/RoleId'
      responses:
        '204':
          description: Role deleted

  /api/v1/modules:
    get:
      tags: [ module ]
      summary: List modules, each with the permissions available for it
      operationId: getModules
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Modules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModuleResponse'

  /api/v1/permissions:
    get:
      tags: [ permission ]
      summary: Flat list of all module:action permissions
      operationId: getPermissions
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Permissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PermissionResponse'

  /api/v1/users:
    get:
      tags: [ user ]
      summary: Paginated list of users
      operationId: getUsers
      security:
        - bearerAuth: [ ]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPageResponse'
    post:
      tags: [ user ]
      summary: Create a new user
      operationId: createUser
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '200':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/v1/users/{id}:
    get:
      tags: [ user ]
      summary: Get a user by id
      operationId: getUserById
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    put:
      tags: [ user ]
      summary: Update a user's profile, role or active status
      operationId: updateUser
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    delete:
      tags: [ user ]
      summary: Deactivate a user (soft delete)
      operationId: deactivateUser
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: User deactivated

  /api/v1/users/{id}/permanent:
    delete:
      tags: [ user ]
      summary: Permanently delete a user (hard delete - removes the account entirely)
      operationId: deleteUserPermanently
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: User permanently deleted

  /api/v1/users/{id}/password:
    put:
      tags: [ user ]
      summary: Reset a user's password (admin action)
      operationId: updateUserPassword
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordUpdateRequest'
      responses:
        '204':
          description: Password updated

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    RoleId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    UserId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64

  schemas:
    LoginRequest:
      type: object
      required: [ email, password ]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    RefreshTokenRequest:
      type: object
      required: [ refreshToken ]
      properties:
        refreshToken:
          type: string

    RoleSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string

    CurrentUserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        fullName:
          type: string
        role:
          $ref: '#/components/schemas/RoleSummary'
        permissions:
          type: array
          items:
            type: string

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          default: Bearer
        expiresIn:
          type: integer
          format: int64
          description: Access token TTL in seconds
        user:
          $ref: '#/components/schemas/CurrentUserResponse'

    PermissionResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        moduleCode:
          type: string
        moduleName:
          type: string
        action:
          type: string
        code:
          type: string
          description: "moduleCode:action, e.g. PROJECT:VIEW"

    ModuleResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        name:
          type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/PermissionResponse'

    RoleRequest:
      type: object
      required: [ name ]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: string
        permissionIds:
          type: array
          items:
            type: integer
            format: int64

    RoleResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        isSystem:
          type: boolean
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/PermissionResponse'

    UserCreateRequest:
      type: object
      required: [ email, password, fullName, roleId ]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        fullName:
          type: string
        phoneNumber:
          type: string
        roleId:
          type: integer
          format: int64
        departmentId:
          type: integer
          format: int64

    UserUpdateRequest:
      type: object
      properties:
        fullName:
          type: string
        phoneNumber:
          type: string
        roleId:
          type: integer
          format: int64
        departmentId:
          type: integer
          format: int64
        isActive:
          type: boolean

    PasswordUpdateRequest:
      type: object
      required: [ newPassword ]
      properties:
        newPassword:
          type: string
          minLength: 8

    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        fullName:
          type: string
        phoneNumber:
          type: string
        isActive:
          type: boolean
        role:
          $ref: '#/components/schemas/RoleSummary'
        departmentId:
          type: integer
          format: int64
        departmentName:
          type: string

    UserPageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/UserResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
